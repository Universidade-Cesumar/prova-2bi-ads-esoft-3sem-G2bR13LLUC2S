<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Almoxarifado</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Sistema de Controle de Almoxarifado</h1>

    <div class="container">

        <div class="formulario">

            <h2>Cadastrar Material</h2>

            <label for="input-nome">Nome do Material</label>
            <input type="text" id="input-nome">

            <label for="input-quantidade">Quantidade</label>
            <input type="number" id="input-quantidade">

            <button id="btn-cadastrar">
                Cadastrar
            </button>

        </div>

        <div class="tabela">

            <h2>Materiais Cadastrados</h2>

            <p id="total-itens">
                Total de itens: 0
            </p>

            <input
                type="text"
                id="input-busca"
                placeholder="Pesquisar material...">

            <table id="lista-materiais">

                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Quantidade</th>
                        <th>Retirada</th>
                        <th>Baixar</th>
                        <th>Excluir</th>
                    </tr>
                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
